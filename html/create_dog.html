<!DOCTYPE html>
<html>

  <head>
    <title>Add dog to database</title>
  </head>

  <body>
    <form action="/create_dog" method="post">
      <p>
        Registration number:
        <input type="text" name="registration_number" placeholder="Registration number" maxlength=10 required />
      </p>
      <p>
        Name:
        <input type="text" name="name" maxlength=20 required />
      </p>
      <p>
        <label for="breed">Breed:</label>
        <select name="breed" id="breed">
          {% for breed in dog_breeds %}
          <option value="breed">{{ breed.name }}</option>
          {% endfor %}
        </select> 
      </p>
      <p>
        Born date:
        <input type="date" name="born_date" value="yyyy/mm/dd" />
      </p>
      <p>
        Death date:
        <input type="date" name="born_date" value="yyyy/mm/dd" />
      </p>
      <p>
        Sex:
        <input type="radio" id="sexChoice1" name="sex" value="M" />
        <label for="sexChoice1">Male</label>

        <input type="radio" id="sexChoice2" name="sex" value="F" />
        <label for="sexChoice2">Female</label>
      </p>
      <p>
        Father:
        <input type="text" name="father_id" placeholder="Registration number" maxlength=10 required />
      </p>
      <p>
        Mother:
        <input type="text" name="mother_id" placeholder="Registration number" maxlength=10 required />
      </p>
      <p>
        Litters:
        <input type="number" name="litters" placeholder="" maxlength=3 />
      </p>
      <p>
        Championship title:
        <input type="text" name="championship_title" placeholder="" maxlength=5 />
      </p>
      <input type="submit" value="Save" />
    </form>
  </body>
</html>
