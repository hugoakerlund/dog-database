<!DOCTYPE html>
<html>

<head>
  <title>Dog Database</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
  <h1>Add a new dog to the database</h1>
  <p>
    <a href="/">Home</a>
    <a href="/litters">Litters</a>
    <a href="/owners">Owners</a>
    {% if session.get('username') %}
    <a href="/create_litter">Add a new litter to the database</a>
    <a href="/my_dogs">My dogs</a>
    {% endif %}
  </p>
  <form action="/create_dog" method="post" enctype="multipart/form-data">
    <p>
      Registration number:
      <input type="text" name="registration_number" placeholder="Registration number" maxlength=10 required />
    </p>
    <p>
      Add image:
      <input type="file" name="image" accept=".jpg,.jpeg,.JPG,.JPEG" required />
    </p>
    <p>
      Name:
      <input type="text" name="name" maxlength=20 required />
    </p>
    <p>
      <label for="color">Color:</label>
      <select name="color" id="color">
        {% for color in colors %}
        <option value="{{ color.name }}">{{ color.name }}</option>
        {% endfor %}
      </select>
    </p>
    <p>
      <label for="breed">Breed:</label>
      <select name="breed" id="breed">
        {% for breed in dog_breeds %}
        <option value="{{ breed.name }}">{{ breed.name }}</option>
        {% endfor %}
      </select>
    </p>
    <p>
      Born date:
      <input type="date" name="date_of_birth" value="yyyy/mm/dd" required />
    </p>
    <p>
      Death date:
      <input type="date" name="date_of_death" value="yyyy/mm/dd" />
    </p>
    <p>
      Sex:
      <input type="radio" id="sexChoice1" name="sex" value="M" />
      <label for="sexChoice1">Male</label>

      <input type="radio" id="sexChoice2" name="sex" value="F" />
      <label for="sexChoice2">Female</label>
    </p>
    <p>
      Father:
      <input type="text" name="father_id" placeholder="Registration number" maxlength=10 />
    </p>
    <p>
      Mother:
      <input type="text" name="mother_id" placeholder="Registration number" maxlength=10 />
    </p>
    <p>
      Litter:
      <input type="text" name="litter" placeholder="Litter name" maxlength=20 />
    </p>
    <p>
      <label for="championship_title">Championship Title:</label>
      <select name="championship_title" id="championship_title">
        {% for championship_title in championship_titles %}
        <option value="{{ championship_title.title }}">{{ championship_title.title }}</option>
        {% endfor %}
      </select>
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Save" />
  </form>
</body>

</html>
