<!DOCTYPE html>
<html>

<head>
    <title>Remove dog from database</title>
</head>
<form action="/remove/{{ dog.id }}" method="post">
    <p>
        Are you sure you want to remove {{ dog.name }} from the database?
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" name="continue" value="Continue" />
    <input type="submit" name="cancel" value="Cancel" />
</form>

</html>
