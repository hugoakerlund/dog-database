<!DOCTYPE html>
<html>

<head>
    <title>Dog Database</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
    <h1>Remove dog: {{ dog.name }}</h1>
    <p>
        <a href="/">Home</a>
        <a href="/litters">Litters</a>
        <a href="/owners">Owners</a>
        {% if session.get('username') %}
        <a href="/create_dog">Add a new dog to the database</a>
        <a href="/create_litter">Add a new litter to the database</a>
        <a href="/my_dogs">My dogs</a>
        {% endif %}
    </p>
    <form action="/remove/{{ dog.id }}" method="post">
        <p>
            Are you sure you want to remove {{ dog.name }} from the database?
        </p>
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
        <input type="submit" name="continue" value="Continue" />
        <input type="submit" name="cancel" value="Cancel" />
    </form>
</body>

</html>
