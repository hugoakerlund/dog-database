
<!DOCTYPE html>
<html>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Father</th>
            <th>Mother</th>
            <th>Date of Birth</th>
        </tr>
        {% for litter in litters %}
        <tr>
            <td><a href="/litter/{{ litter.name }}">{{ litter.name }}</a></td>
            <td><a href="/dog/{{ litter.father_id }}">{{ litter.father_registration_number or "Unknown" }}</a></td>
            <td><a href="/dog/{{ litter.mother_id }}">{{ litter.mother_registration_number or "Unknown" }}</a></td>
            <td>{{ litter.date_of_birth }}</td>
        {% endfor %}
    </table>
</body>
</html>
