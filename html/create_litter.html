{% extends "html/layout.html" %}

{% block title %}Dog Database{% endblock %}

{% block content %}

<h2>Add litter</h2>

{% for message in get_flashed_messages() %}
<p>
  <b>{{ message }}</b>
</p>
{% endfor %}
<form action="/create_litter" method="post">
  <p>
    Name:
    <input type="text" name="name" maxlength=20 required />
  </p>
  <p>
    <label>
      Mother:
      <select name="mother">
        <option value="">None</option>
        {% for dog in female_dogs %}
        <option value="{{ dog.registration_number }}">{{ dog.name }} ({{ dog.registration_number }})</option>
        {% endfor %}
      </select>
    </label>
  </p>
  <p>
    <label>
      Father
      <select name="father">
        <option value="">None</option>
        {% for dog in male_dogs %}
        <option value="{{ dog.registration_number }}">{{ dog.name }} ({{ dog.registration_number }})</option>
        {% endfor %}
      </select>
    </label>
  </p>
  <p>
    Date of birth:
    <input type="date" name="date_of_birth" value="yyyy/mm/dd" required />
  </p>
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" value="Save" />
</form>
</body>

{% endblock %}
