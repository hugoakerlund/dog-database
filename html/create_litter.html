{% extends "html/layout.html" %}

{% block title %}Dog Database{% endblock %}

{% block content %}

<h2>Add litter</h2>

<form action="/create_litter" method="post">
    <p>
        Name:
        <input type="text" name="name" maxlength=20 required
            value="{{ filled.name }}"
        />
    </p>
    <p>
        <label for="father">Father:</label>
        <select name="father_id" id="father">
            <option value="">None</option>
            {% for dog in male_dogs %}
            {% if filled %}
            <option value="{{ dog.id }}"
                {% if dog.id|string == filled.father_id|string %}selected{% endif %}>
                {{ dog.name }} ({{ dog.registration_number }})
            </option>
            {% else %}
            <option value="{{ dog.id }}">{{ dog.name }} ({{ dog.registration_number }})</option>
            {% endif %}
            {% endfor %}
        </select>
    </p>
    <p>
        <label for="mother">Mother:</label>
        <select name="mother_id" id="mother">
            <option value="">None</option>
            {% for dog in female_dogs %}
            {% if filled %}
            <option value="{{ dog.id }}"
                {% if dog.id|string == filled.mother_id|string %}selected{% endif %}>
                {{ dog.name }} ({{ dog.registration_number }})
            </option>
            {% else %}
            <option value="{{ dog.id }}">{{ dog.name }} ({{ dog.registration_number }})</option>
            {% endif %}
            {% endfor %}
        </select>
    </p>
    <p>
        Date of birth:
        <input type="date" name="date_of_birth" required
            value="{{ filled.date_of_birth }}"
        />
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Save" />
</form>

{% endblock %}
