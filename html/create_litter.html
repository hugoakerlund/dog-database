<!DOCTYPE html>
<html>
  <head>
    <title>Dog Database</title>
  </head>

  <body>
    <h1>Add a new litter to the database</h1>
    <p>
      <a href="/">Home</a>
      {% if session.get('username') %}
      <a href="/create_dog">Add a new dog to the database</a>
      <a href="/my_dogs">My dogs</a>
      {% endif %}
    </p>
    <form action="/create_litter" method="post">
      <p>
        Name:
        <input type="text" name="name" maxlength=20 required />
      </p>
      <p>
        Father:
        <input type="text" name="father" placeholder="Registration number" maxlength=10 />
      </p>
      <p>
        Mother:
        <input type="text" name="mother" placeholder="Registration number" maxlength=10 />
      </p>
      <p>
        Date of birth:
        <input type="date" name="date_of_birth" value="yyyy/mm/dd" required />
      </p>
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
      <input type="submit" value="Save" />
    </form>
  </body>
</html>
