<!DOCTYPE html>
<html>

<head>
  <title>Dog Database</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
  <h1>Register</h1>
  <p>
    <a href="/">Home</a>
    <a href="/litters">Litters</a>
    <a href="/owners">Owners</a>
  </p>
  <form action="/register" method="post">
    <p>
      Name: <br />
      <input type="text" name="name" maxlength=20 required />
    </p>
    <p>
      Email: <br />
      <input type="text" name="email" maxlength=50 required />
    </p>
    <p>
      Password: <br />
      <input type="password" name="password1" maxlength=35 required />
    </p>
    <p>
      Password again: <br />
      <input type="password" name="password2" maxlength=35 required />
    </p>
    <input type="submit" value="Create account" maxlength=35 required />
  </form>
</body>

</html>
