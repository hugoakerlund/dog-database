<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
</head>

<body>
  <form action="/login" method="post">
    <p>
      Username: <br />
      <input type="text" name="username" maxlength=20 required/>
    </p>
    <p>
      Password: <br />
      <input type="password" name="password" maxlength=35 required/>
    </p>
    <input type="submit" value="Login" />
  </form>
</body>

</html>
