{% extends "html/layout.html" %}

{% block title %}Dog Database{% endblock %}

{% block content %}

<h2>Edit {{ litter.name }}</h2>

{% for message in get_flashed_messages() %}
<p>
    <b>{{ message }}</b>
</p>
{% endfor %}
<form action="/edit_litter/{{ litter.id }}" method="post" enctype="multipart/form-data">
    <p>
        Name:
        <input type="text" name="name" value="{{ litter.name }}" maxlength=20 required />
    </p>
    <p>
        Father:
        <input type="text" name="father" value="{{ litter.father }}" placeholder="Registration number" maxlength=10 />
    </p>
    <p>
        Mother:
        <input type="text" name="mother" value="{{ litter.mother }}" placeholder="Registration number" maxlength=10 />
    </p>
    <p>
        Date or birth:
        <input type="date" name="date_of_birth" value="{{ litter.date_of_birth }}" required />
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Save" />
</form>
</body>

{% endblock %}
