<!DOCTYPE html>
<html>
<head>
  <title>Dogdatabase</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
    <h1>Welcome to the Dog Database!</h1>
    <p>login <a href="/login">here</a> or register <a href="/register">here</a>.</p>

    {% for dog in dogs %}
        <a href="/dog/{{ dog.registration_number }}">View details</a>
        <h2>{{ dog.name }}</h2>
        <p>Breed: {{ dog.breed }}</p>
        <p>Born: {{ dog.born_date }}</p>
    {% endfor %}
</body>
</html>
