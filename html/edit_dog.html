{% extends "html/layout.html" %}

{% block title %}Dog Database{% endblock %}

{% block content %}

<h2>Edit {{ dog.name }}</h2>

<form action="/edit_dog/{{ dog.id }}" method="post" enctype="multipart/form-data">
  <p>
    Registration number:
    <input type="text" name="registration_number" value="{{ dog.registration_number }}"
      placeholder="Registration number" maxlength=10 required />
  </p>
  <p>
    Add image:
    <input type="file" name="image" accept=".jpg,.jpeg,.JPG,.JPEG" required />
  </p>
  <p>
    Name:
    <input type="text" name="name" value="{{ dog.name }}" maxlength=20 required />
  </p>
  <p>
    <label for="color">Color:</label>
    <select name="color" id="color">
      {% for color in colors %}
      <option value="{{ color.name }}">{{ color.name }}</option>
      {% endfor %}
    </select>
  </p>
  <p>
    <label for="breed">Breed:</label>
    <select name="breed" id="breed">
      {% for breed in dog_breeds %}
      <option value="{{ breed.name }}">{{ breed.name }}</option>
      {% endfor %}
    </select>
  </p>
  <p>
    Date or birth:
    <input type="date" name="date_of_birth" value="{{ dog.date_of_birth }}" required />
  </p>
  <p>
    Date of death:
    <input type="date" name="date_of_death" value="{{ dog.date_of_death }}" />
  </p>
  <p>
    Sex:
    <input type="radio" id="sexChoice1" name="sex" value="M" />
    <label for="sexChoice1">Male</label>

    <input type="radio" id="sexChoice2" name="sex" value="F" />
    <label for="sexChoice2">Female</label>
  </p>
  <p>
    Father:
    <input type="text" name="father" value="{{ dog.father_registration_number }}" placeholder="Registration number" maxlength=10
    pattern="^FI\d{5}/\d{2}$" title="Format: FI12345/12 (FI, five digits, slash, two digits)" />
  </p>
  <p>
    Mother:
    <input type="text" name="mother" value="{{ dog.mother_registration_number }}" placeholder="Registration number" maxlength=10
    pattern="^FI\d{5}/\d{2}$" title="Format: FI12345/12 (FI, five digits, slash, two digits)" />
  </p>
  <p>
    Litter:
    <input type="text" name="litter" value="{{ dog.litter }}" placeholder="Litter name" maxlength=20 />
  </p>
  <p>
    <label for="best_show">Best Show:</label>
    <select name="best_show" id="best_show">
      <option value="">None</option>
      {% for show in participated_shows %}
      <option value="{{ show.name }}" {% if show.name==dog.best_show_name %}selected{% endif %}>{{ show.name }} ({{
        show.date }})</option>
      {% endfor %}
    </select>
  </p>
  <p>
    Best test:
    <input type="number" name="best_test" min=1 max=5 />
  </p>
  <p>
    Use index:
    <input type="number" name="use_index" min=1 max=100 />
  </p>
  <p>
    Hip index:
    <input type="number" name="hip_index" min=1 max=100 />
  </p>
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" value="Save" />
</form>
</body>

{% endblock %}
